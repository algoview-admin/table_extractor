<script>
/* ══════════ DATA ══════════ */
const STAGES = [
  { id:1, k:'s1',
    name:'数式評価ヘルパー機能',

    desc:'openpyxl を data_only=True で読み込むと、Excel で一度も開かれていないファイルの数式セルは値が None になる。セル参照の解析と簡易な数式評価（SUM・単一参照・四則演算）で、この欠損値を自前で補完する。',
    fns:[{n:'_col_to_num',pub:false},{n:'_parse_cell_ref',pub:false},{n:'_eval_formula',pub:false},{n:'_fill_formula_cells',pub:false}],
    rows:[

    ]},
  { id:2, k:'s2',

    fns:[{n:'_build_value_grid',pub:false},{n:'_build_grid_from_xlrd',pub:false}],
    rows:[
      {k:'対応形式',v:'_build_value_grid: .xlsx / .xlsm / .xlsb（openpyxl）／ _build_grid_from_xlrd: .xls（xlrd, レガシー）'},

/* ══════════ COLOR VARS ══════════ */
const SV = {
  s1:{c:'var(--s1)',bg:'var(--s1-bg)'},
  s2:{c:'var(--s2)',bg:'var(--s2-bg)'},
  s3:{c:'var(--s3)',bg:'var(--s3-bg)'},
  s4:{c:'var(--s4)',bg:'var(--s4-bg)'},
};
const KEYS = ['s1','s2','s3','s4'];
function sv(k){const v=SV[k];return `--sc:${v.c};--sc-bg:${v.bg}`}

/* ══════════ STATE ══════════ */
let activeStage=null, isStageSplit=false, leftW=460;
let expandedFns=new Set(); // 中央パネルでカード下に詳細展開中の関数名
let subFnStack={}; // カード内右側インスペクタのナビゲーションスタック: { [トップ関数名]: [子関数名, 孫関数名, ...] }
let subSplitRatio={}; // カード内の 処理ステップ/子関数インスペクタ 分割比率: { [トップ関数名]: 0〜1（既定 0.5 = 中央） }

/* ══════════ BUILD OVERVIEW ══════════ */
function buildOverview(){
  let h=`
    <div class="io-bar">
      <div class="io-cell" style="--sc:var(--s1)">
        <div class="io-lbl">入力</div>
        <div class="io-val">bytes（Excel / CSV ファイルの内容）、ファイル名</div>
        <div class="io-sub">アップロードされたファイルのバイト列</div>
      </div>
      <div class="io-cell" style="--sc:var(--s3)">
        <div class="io-lbl">出力</div>
        <div class="io-val">List[SheetGrid] / pd.DataFrame（CSV の場合）</div>
        <div class="io-sub">シートごとの生グリッド（1-indexed 2次元配列）</div>
      </div>
    </div>`;

  STAGES.forEach((s,i)=>{
    const k=KEYS[i];
    const pills=s.fns.map(f=>`<span class="pill${f.pub?' pub':''}">${f.n}</span>`).join('');
    const rows=s.rows.map(r=>`<div class="dr"><span class="dk">${r.k}</span><span class="dv">${r.v}</span></div>`).join('');
    const isActive=activeStage===s.id;
    h+=`
      <div class="stage-card${isActive?' active':''}" id="sc${s.id}" style="${sv(k)}" onclick="selectStage(${s.id})">
        <div class="stage-hd">
          <span class="stage-chip">S${s.id}</span>
          <span style="font-size:15px">${s.emoji}</span>
          <span class="stage-name">${s.name}</span>
        </div>
        <div class="stage-body">
          <div class="stage-desc">${s.desc}</div>
          <div class="fn-pills">${pills}</div>
          <div class="detail-rows">${rows}</div>
        </div>
      </div>`;
    if(i<3) h+=`<div class="arr"><div class="arr-line"></div><div class="arr-head"></div></div>`;
  });
  h+=`<div class="click-hint">▲ カードをクリックして関数フローを表示 / 再クリックで全体に戻る</div>`;
  document.getElementById('left-inner').innerHTML=h;
}

/* ══════════ SELECT / TOGGLE STAGE ══════════ */
function selectStage(id){
  if(activeStage===id && isStageSplit){ closeSplit(); return; }
  if(activeStage!==id){ expandedFns.clear(); subFnStack={}; subSplitRatio={}; }
  activeStage=id;
  document.querySelectorAll('.stage-card').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('sc'+id);
  if(card) card.classList.add('active');
  if(!isStageSplit){
    isStageSplit=true;
    document.getElementById('app').classList.add('s-split');
    document.getElementById('left-wrap').style.width=leftW+'px';
  }
  renderStageFlow(id);
}

/* ══════════ CLOSE SPLIT ══════════ */
function closeSplit(){
  isStageSplit=false; activeStage=null;
  expandedFns.clear(); subFnStack={}; subSplitRatio={};
  const app=document.getElementById('app');
  app.classList.remove('s-split');
  document.getElementById('left-wrap').style.width='';
  document.getElementById('mid-inner').innerHTML='';
  document.querySelectorAll('.stage-card').forEach(c=>c.classList.remove('active'));
}

/* ══════════ RENDER STAGE FLOW ══════════ */
function renderStageFlow(id, resetScroll=true){
  const s=STAGES[id-1], k=KEYS[id-1], fl=FLOWS[id];
  const nodesHtml=fl.nodes.map(n=>{
    if(n.type==='arrow') return `
      <div class="flow-arr">
        <div class="fa-ln"></div>
        <span class="fa-lbl">${n.label}</span>
        <div class="fa-hd"></div>
      </div>`;
    const curSub=(subFnStack[n.fn]||[]).slice(-1)[0];
    const uses=n.uses.length?`<div class="fn-uses">${n.uses.map(u=>`
      <div class="use-row">
        <span class="use-arr">↳ 呼び出し</span>
        <span class="use-fn${curSub===u.fn?' uf-active':''}" onclick="event.stopPropagation();openSubFn('${n.fn}','${u.fn}')">${u.fn}</span>
        <span class="use-nt">— ${u.note}</span>
      </div>`).join('')}</div>`:'';
    const isOpen=expandedFns.has(n.fn);
    const inlineDetail=isOpen?buildInlineDetailHtml(n.fn):'';
    return `<div class="fn-box${isOpen?' fx-active':''}" onclick="toggleInline('${n.fn}')">
      <div class="fn-bh">
        <span class="fn-nm">${n.fn}</span>
        <span class="fn-badge ${n.pub?'fb-pub':'fb-prv'}">${n.pub?'Public':'Private'}</span>
      </div>
      <div class="fn-desc">${n.desc}</div>
      ${uses}
      <div class="fn-ret"><span class="fn-ret-lbl">→ return</span><span class="fn-ret-val">${n.ret}</span></div>
      ${inlineDetail}
    </div>`;
  }).join('');

  const midEl=document.getElementById('mid-inner');
  if(!midEl) return;
  midEl.innerHTML=`
    <div style="${sv(k)}">
      <div class="rf-top">
        <div>
          <div class="sf-tag">${s.emoji} Stage ${id}</div>
          <div class="sf-title">${s.name}</div>
        </div>
        <button class="rf-close" onclick="closeSplit()" title="全体に戻る (←)">✕</button>
      </div>
      <div class="sf-overview">${fl.overview}</div>
      <div class="sec-label">関数フロー（カードをクリックで詳細展開）</div>
      <div id="fn-flow-area">${nodesHtml}</div>
    </div>`;
  if(resetScroll) document.getElementById('mid-wrap').scrollTop=0;
}

/* ══════════ TOGGLE INLINE FUNCTION DETAIL (below the card) ══════════ */
function toggleInline(fn){
  if(expandedFns.has(fn)) expandedFns.delete(fn); else expandedFns.add(fn);
  rerenderMid();
}

/* ══════════ NESTED-FUNCTION INSPECTOR (right side of the card) ══════════ */
function openSubFn(cardFn, targetFn){
  expandedFns.add(cardFn);
  const stack=subFnStack[cardFn]||(subFnStack[cardFn]=[]);
  if(stack[stack.length-1]!==targetFn) stack.push(targetFn);
  rerenderMid();
}
function jumpSubFn(cardFn, idx){
  const stack=subFnStack[cardFn];
  if(!stack) return;
  stack.length=idx+1;
  rerenderMid();
}
function closeSubFn(cardFn){
  delete subFnStack[cardFn];
  delete subSplitRatio[cardFn];
  rerenderMid();
}
function rerenderMid(){
  const mw=document.getElementById('mid-wrap');
  const st=mw.scrollTop;
  renderStageFlow(activeStage, false);
  mw.scrollTop=st;
}

function buildInlineDetailHtml(fnName){
  const fn=FN[fnName];
  if(!fn) return '';
  const stack=subFnStack[fnName]||[];
  const stepsHtml=`<div class="steps">${buildStepsHtml(fn,fnName)}</div>`;
  let bodyHtml;
  if(stack.length){
    const ratio=subSplitRatio[fnName] ?? 0.5; // 既定は親関数のちょうど中心
    bodyHtml=`
      <div class="fid-body" data-card="${fnName}">
        <div class="fid-steps" style="flex:0 0 calc(${(ratio*100).toFixed(2)}% - 3px)">${stepsHtml}</div>
        <div class="fid-dvd" data-card="${fnName}" title="ドラッグで幅調整"></div>
        <div class="fid-sub">${renderSubFnPanel(fnName,stack)}</div>
      </div>`;
  } else {
    bodyHtml=`<div class="fid-body"><div class="fid-steps">${stepsHtml}</div></div>`;
  }
  return `
    <div class="fn-inline-detail" onclick="event.stopPropagation()">
      <div class="fd-io">
        <div class="io-cell" style="--sc:var(--s2)"><div class="io-lbl">入力</div><div class="io-val">${fn.io.i}</div></div>
        <div class="io-cell" style="--sc:var(--s4)"><div class="io-lbl">出力</div><div class="io-val">${fn.io.o}</div></div>
      </div>
      <div class="sec-label">処理ステップ</div>
      ${bodyHtml}
    </div>`;
}

function renderSubFnPanel(cardFn, stack){
  const cur=stack[stack.length-1];
  const sf=FN[cur];
  if(!sf) return '';
  const ancestors=stack.slice(0,-1);
  const crumbHtml=ancestors.length?`<div class="fid-crumb">${ancestors.map((name,i)=>
    `<span class="cr-lnk" onclick="event.stopPropagation();jumpSubFn('${cardFn}',${i})">${name}</span><span class="cr-sep">›</span>`
  ).join('')}</div>`:'';
  return `
    <div class="fid-sub-hd">
      ${crumbHtml}
      <div class="fn-bh" onclick="event.stopPropagation();closeSubFn('${cardFn}')" title="クリックで閉じる">
        <span class="fn-nm">${cur}</span>
        <span class="fn-badge ${sf.pub?'fb-pub':'fb-prv'}">${sf.pub?'Public':'Private'}</span>
        <span class="fid-sub-close-hint">▲ 閉じる</span>
      </div>
    </div>
    <div class="fd-desc">${sf.desc}</div>
    <div class="fd-io">
      <div class="io-cell" style="--sc:var(--s2)"><div class="io-lbl">入力</div><div class="io-val">${sf.io.i}</div></div>
      <div class="io-cell" style="--sc:var(--s4)"><div class="io-lbl">出力</div><div class="io-val">${sf.io.o}</div></div>
    </div>
    <div class="steps">${buildStepsHtml(sf,cardFn)}</div>`;
}

function buildStepsHtml(fn, cardFn){
  return fn.steps.map((st,i)=>{
    const num=i+1, icon=st.t==='c'?'if':st.t==='r'?'↩':num;
    const br=(st.yes||st.no)?`<div class="sbr">
      ${st.yes?`<div class="br"><span class="by">YES</span><span class="bt">${st.yes}</span></div>`:''}
      ${st.no ?`<div class="br"><span class="bn">NO</span><span class="bt">${st.no}</span></div>`:''}
    </div>`:'';
    const curSub=(subFnStack[cardFn]||[]).slice(-1)[0];
    const calls=(st.calls&&st.calls.length)?`<div class="fn-uses step-calls">${st.calls.map(c=>`
      <div class="use-row">
        <span class="use-arr">↳ 呼び出し</span>
        <span class="use-fn${curSub===c?' uf-active':''}" onclick="event.stopPropagation();openSubFn('${cardFn}','${c}')">${c}</span>
      </div>`).join('')}</div>`:'';
    return `<div class="step-row">
      <div class="si si-${st.t}">${icon}</div>
      <div class="sb">
        <div class="st">${st.tx}</div>
        ${st.nt?`<div class="sn">${st.nt}</div>`:''}
        ${br}
        ${calls}
      </div>
    </div>`;
  }).join('');
}

/* ══════════ DRAG RESIZE ══════════ */
(function(){
  function makeDrag(dvdId, getEl, getW, setW){
    const dvd=document.getElementById(dvdId);
    let drag=false, dsx=0, dsw=0;
    dvd.addEventListener('mousedown',e=>{
      drag=true; dsx=e.clientX;
      dsw=getEl().getBoundingClientRect().width;
      dvd.classList.add('drag');
      document.body.style.userSelect='none';
      document.body.style.cursor='col-resize';
      e.preventDefault();
    });
    document.addEventListener('mousemove',e=>{
      if(!drag) return;
      const app=document.getElementById('app');
      const nw=Math.max(240,Math.min(dsw+(e.clientX-dsx),app.clientWidth-240));
      setW(nw); getEl().style.width=nw+'px';
    });
    document.addEventListener('mouseup',()=>{
      if(!drag) return;
      drag=false; dvd.classList.remove('drag');
      document.body.style.userSelect=''; document.body.style.cursor='';
    });
  }
  makeDrag('dvd1',()=>document.getElementById('left-wrap'), ()=>leftW, v=>{leftW=v});
})();

/* ══════════ NESTED-PANEL DRAG RESIZE (per-card, elements are re-created on every render → event delegation) ══════════ */
(function(){
  let dragCard=null, startX=0, startRatio=0.5, containerW=0;
  document.addEventListener('mousedown', e=>{
    const dvd=e.target.closest('.fid-dvd');
    if(!dvd) return;
    dragCard=dvd.dataset.card;
    startX=e.clientX;
    containerW=dvd.closest('.fid-body').getBoundingClientRect().width;
    startRatio=subSplitRatio[dragCard] ?? 0.5;
    dvd.classList.add('drag');
    document.body.style.userSelect='none';
    document.body.style.cursor='col-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!dragCard || !containerW) return;
    let ratio=startRatio + (e.clientX-startX)/containerW;
    ratio=Math.max(.2,Math.min(.8,ratio));
    subSplitRatio[dragCard]=ratio;
    document.querySelectorAll(`.fid-body[data-card="${dragCard}"] .fid-steps`).forEach(el=>{
      el.style.flex=`0 0 calc(${(ratio*100).toFixed(2)}% - 3px)`;
    });
  });
  document.addEventListener('mouseup', ()=>{
    if(!dragCard) return;
    document.querySelectorAll('.fid-dvd.drag').forEach(el=>el.classList.remove('drag'));
    document.body.style.userSelect=''; document.body.style.cursor='';
    dragCard=null; containerW=0;
  });
})();

/* ══════════ INIT ══════════ */
buildOverview();
</script>
