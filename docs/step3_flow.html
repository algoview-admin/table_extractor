<title>step3_normalize — 処理フロー</title>
<style>
/* ── ライトパレット（常時） ─────────────────────────────────────────── */
:root {
  --bg:       #F5F7FF;
  --surface:  #FFFFFF;
  --sur2:     #F8FAFF;
  --sur3:     #EEF2FF;

  --tx1: #1A1D3C;
  --tx2: #4F5578;
  --tx3: #9BA3C0;

  --bd:  #DDE3F5;
  --bd2: #C9D2EE;

  --sh-sm: 0 1px 4px rgba(30,40,100,.07);
  --sh:    0 2px 10px rgba(30,40,100,.09), 0 1px 3px rgba(30,40,100,.05);

  /* Stage accent — S1 sky, S2 violet, S3 fuchsia, S4 emerald, S5 rose,
     S6 amber, S7 indigo, S8 cyan, S9 lime */
  --s1:#0284C7; --s1-bg:#EFF9FF; --s1-lt:#BAE6FD;
  --s2:#6D28D9; --s2-bg:#F5F3FF; --s2-lt:#DDD6FE;
  --s3:#C026D3; --s3-bg:#FDF2FC; --s3-lt:#F5D0FE;
  --s4:#059669; --s4-bg:#ECFDF5; --s4-lt:#A7F3D0;
  --s5:#E11D48; --s5-bg:#FFF1F3; --s5-lt:#FECDD3;
  --s6:#C2410C; --s6-bg:#FFF7ED; --s6-lt:#FED7AA;
  --s7:#4338CA; --s7-bg:#F1F0FE; --s7-lt:#C7D2FE;
  --s8:#0891B2; --s8-bg:#ECFEFF; --s8-lt:#A5F3FC;
  --s9:#65A30D; --s9-bg:#F7FEE7; --s9-lt:#D9F99D;

  --fc-p: #475569; --fc-c: #B45309; --fc-r: #059669;

  --mono: 'Cascadia Code','SF Mono','Fira Code',Consolas,monospace;
  --r: 10px; --rsm: 5px;
}

/* optional dark override via viewer toggle only */
:root[data-theme="dark"] {
  --bg:#0F172A; --surface:#1E293B; --sur2:#162032; --sur3:#0C1F40;
  --tx1:#F1F5F9; --tx2:#94A3B8; --tx3:#475569;
  --bd:#2E4060; --bd2:#3E5272;
  --sh-sm:0 1px 4px rgba(0,0,0,.25); --sh:0 2px 10px rgba(0,0,0,.3);
  --s1:#38BDF8; --s1-bg:#042F2E; --s1-lt:#0C4A6E;
  --s2:#A78BFA; --s2-bg:#1A0F3A; --s2-lt:#2E1B5E;
  --s3:#E879F9; --s3-bg:#2B0A29; --s3-lt:#701A75;
  --s4:#34D399; --s4-bg:#042F2E; --s4-lt:#064E3B;
  --s5:#FB7185; --s5-bg:#2A0A10; --s5-lt:#881337;
  --s6:#FB923C; --s6-bg:#1C0A00; --s6-lt:#431407;
  --s7:#818CF8; --s7-bg:#161233; --s7-lt:#312E81;
  --s8:#22D3EE; --s8-bg:#042F2E; --s8-lt:#164E63;
  --s9:#A3E635; --s9-bg:#0F1C04; --s9-lt:#3F6212;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--tx1);
  font-family:system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif;
  font-size:13px;line-height:1.6;display:flex;flex-direction:column;
}

/* ── Topbar ── */
.topbar{
  flex-shrink:0;display:flex;align-items:center;gap:.6rem;
  padding:.5rem 1.25rem;background:var(--surface);
  border-bottom:1.5px solid var(--bd);box-shadow:var(--sh-sm);
}
.tb-mod{font-family:var(--mono);font-size:11px;color:var(--tx3)}
.tb-sep{color:var(--bd2);font-size:12px}
.tb-title{font-size:13.5px;font-weight:700;color:var(--tx1)}
.tb-hint{margin-left:auto;font-size:11px;color:var(--tx3);font-style:italic}

/* ── Root layout ── */
#app{flex:1;display:flex;min-height:0;overflow:hidden}

/* ── Left wrap (stage overview) ── */
#left-wrap{flex:1;overflow-y:auto}
#left-wrap::-webkit-scrollbar{width:4px}
#left-wrap::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
#left-inner{max-width:680px;margin:0 auto;padding:1.5rem 2rem 2.5rem}
#app.s-split #left-wrap{flex:none}
#app.s-split #left-inner{max-width:none;margin:0;padding:1rem 1.1rem 2rem}

/* ── Mid wrap (stage function flow) ── */
#mid-wrap{
  display:none;overflow:auto;
  background:var(--sur2);border-left:1.5px solid var(--bd);
}
#mid-wrap::-webkit-scrollbar{width:4px}
#mid-wrap::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
#app.s-split #mid-wrap{display:block;flex:1;min-width:260px}
#mid-inner{padding:1.25rem 1.25rem 2rem}

/* ── Drag handles ── */
.dvd{
  display:none;width:5px;flex-shrink:0;cursor:col-resize;
  background:var(--bd);position:relative;transition:background .15s;
}
.dvd::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:3px;height:32px;border-radius:2px;background:var(--bd2);
}
.dvd:hover,.dvd.drag{background:var(--sc,var(--s1))}
.dvd:hover::after,.dvd.drag::after{background:var(--sc,var(--s1))}
#app.s-split #dvd1{display:block}

/* ── IO Banner ── */
.io-bar{
  display:flex;border:1.5px solid var(--bd);border-radius:var(--r);
  overflow:hidden;background:var(--surface);margin-bottom:1.25rem;
  box-shadow:var(--sh-sm);
}
.io-cell{flex:1;padding:.65rem 1rem}
.io-cell+.io-cell{border-left:1.5px solid var(--bd)}
.io-lbl{

}
.io-val{font-family:var(--mono);font-size:11.5px;color:var(--tx1);font-weight:600}

/* ── Stage card ── */
.stage-card{
  background:var(--surface);border:2px solid var(--bd);

  cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .12s;
}
.stage-card:hover{

.stage-card.active{

}
.stage-name{font-size:12.5px;font-weight:700;color:var(--sc)}
.stage-body{padding:.7rem 1rem .9rem}
.stage-desc{font-size:12.5px;color:var(--tx2);line-height:1.6;margin-bottom:.55rem}
.fn-pills{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.6rem}
.pill{

.pill.pub{

.detail-rows{
  border-top:1px solid var(--bd);padding:.5rem 0 .2rem;

.dr{display:grid;grid-template-columns:auto 1fr;gap:.4rem .8rem;align-items:baseline}
.dk{font-size:10.5px;font-weight:700;color:var(--tx3);white-space:nowrap}
.dv{font-size:12px;color:var(--tx2);line-height:1.45}

/* toggle hint on active card */
.stage-card.active .stage-hd::after{
  content:'クリックで戻る';margin-left:auto;font-size:10px;
  color:var(--sc);opacity:.7;
}

/* ── Arrow between cards ── */
.arr{display:flex;flex-direction:column;align-items:center;padding:.3rem 0}
.arr-line{width:1.5px;height:14px;background:var(--bd2)}
.arr-head{

}

/* ── Click hint ── */
.click-hint{margin-top:1rem;text-align:center;font-size:11.5px;color:var(--tx3)}

/* ── Right: stage flow ── */
.rf-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.8rem}
.rf-close{
  width:28px;height:28px;border-radius:6px;border:1.5px solid var(--bd);
  background:var(--surface);color:var(--tx3);cursor:pointer;

  transition:background .13s,color .13s,border-color .13s;flex-shrink:0;

.rf-close:hover{background:var(--bd);color:var(--tx1);border-color:var(--bd2)}
.sf-tag{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--sc);margin-bottom:.3rem}
.sf-title{font-size:15.5px;font-weight:800;color:var(--tx1);letter-spacing:-.015em;margin-bottom:.3rem}
.sf-overview{font-size:12.5px;color:var(--tx2);line-height:1.65;margin-bottom:1rem}

.sec-label{
  font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--tx3);margin-bottom:.65rem;display:flex;align-items:center;gap:.5rem;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── Function flow box ── */
.fn-box{
  background:var(--surface);border:1.5px solid var(--bd);border-radius:var(--rsm);
  padding:.65rem .9rem;cursor:pointer;margin-bottom:.5rem;
  transition:border-color .13s,box-shadow .13s;
}
.fn-box:hover{
  border-color:var(--sc);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--sc) 10%,transparent);
}
.fn-box.fx-active{
  border-color:var(--sc);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--sc) 15%,transparent);
  background:color-mix(in srgb,var(--sc) 4%,var(--surface));
}
.fn-box.fx-active > .fn-bh::after{
  content:'▲ 閉じる';margin-left:auto;font-size:9.5px;font-weight:700;
  color:var(--sc);opacity:.75;
}
.fn-bh{display:flex;align-items:center;gap:.45rem;margin-bottom:.3rem}
.fn-nm{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--tx1)}
.fn-box:hover .fn-nm,.fn-box.fx-active .fn-nm{color:var(--sc)}
.fn-badge{
  font-size:9px;font-weight:700;letter-spacing:.03em;
  padding:1px 6px;border-radius:3px;flex-shrink:0;
}
.fb-pub{background:var(--sc);color:#fff}
.fb-prv{background:var(--sur2);color:var(--tx3);border:1px solid var(--bd)}
.fn-desc{font-size:11.5px;color:var(--tx2);margin-bottom:.4rem;line-height:1.45}
.fn-uses{display:flex;flex-direction:column;gap:.2rem;margin-bottom:.35rem}
.use-row{display:flex;align-items:baseline;gap:.35rem;font-size:11.5px}
.use-arr{color:var(--tx3);font-size:10px;flex-shrink:0}
.use-fn{
  font-family:var(--mono);font-size:11px;color:var(--sc);cursor:pointer;
  text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;
}
.use-fn:hover{text-decoration-style:solid}
.use-fn.uf-active{color:var(--sc);font-weight:700;text-decoration-style:solid}
.use-nt{color:var(--tx3);font-size:11px}
.fn-ret{
  display:flex;align-items:baseline;gap:.4rem;font-size:11px;
  border-top:1px dashed var(--bd);padding-top:.3rem;color:var(--tx3);
}
.fn-ret-lbl{font-weight:700;flex-shrink:0}
.fn-ret-val{font-family:var(--mono);color:var(--tx2)}

/* ── Inline function detail (expands below the card, within stage flow) ── */
.fn-inline-detail{
  margin-top:.65rem;padding-top:.65rem;border-top:1.5px dashed var(--bd);
}
.fn-inline-detail .fd-io{margin-bottom:.75rem}
.fn-inline-detail .sec-label{margin-top:0}

/* two-column body inside an expanded card: steps (left) + nested-fn inspector (right).
   Split starts at the card's center (50/50) and is drag-resizable via .fid-dvd. */
.fid-body{display:flex;align-items:stretch}
.fid-steps{flex:1 1 auto;min-width:160px}
.fid-steps .steps{max-width:none}

/* drag handle between a card's own steps and its nested-fn inspector */
.fid-dvd{
  width:6px;flex-shrink:0;align-self:stretch;cursor:col-resize;
  background:var(--bd);position:relative;transition:background .15s;
  margin:0 .55rem;
}
.fid-dvd::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:3px;height:28px;border-radius:2px;background:var(--bd2);
}
.fid-dvd:hover,.fid-dvd.drag{background:var(--sc)}
.fid-dvd:hover::after,.fid-dvd.drag::after{background:var(--sc)}

/* ── Nested-function inspector (shown to the right of a step's own steps, inside the same card) ── */
.fid-sub{
  flex:1 1 auto;min-width:160px;
}
.fid-sub-hd{margin-bottom:.5rem}
.fid-crumb{font-size:10.5px;color:var(--tx3);display:flex;flex-wrap:wrap;gap:.3rem;align-items:center;margin-bottom:.2rem}
.cr-lnk{color:var(--sc);cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
.cr-lnk:hover{text-decoration-style:solid}
.cr-sep{color:var(--tx3)}
/* 子関数ヘッダー: 親カードの「▲ 閉じる」と同じ配置・挙動（右上・クリックで閉じる） */
.fid-sub .fn-bh{margin-bottom:.4rem;cursor:pointer}
.fid-sub .fn-bh:hover .fn-nm{color:var(--sc)}
.fid-sub-close-hint{
  margin-left:auto;font-size:9.5px;font-weight:700;color:var(--sc);opacity:.75;
}
.fid-sub .fd-desc{font-size:11.5px;color:var(--tx2);line-height:1.55;margin-bottom:.6rem}
.fid-sub .fd-io{margin-bottom:.65rem}
.fid-sub .steps{max-width:none}

/* step-level "calls" links (inline, inside a step's body) */
.step-calls{margin-top:.3rem}

/* flow arrow */
.flow-arr{display:flex;flex-direction:column;align-items:center;padding:.15rem 0;margin:.1rem 0}
.fa-ln{width:1.5px;height:16px;background:var(--fc-ln)}
.fa-lbl{font-size:10px;color:var(--tx3);margin:.05rem 0;text-align:center}
.fa-hd{border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid var(--fc-ln)}

.fd-desc{font-size:12.5px;color:var(--tx2);line-height:1.6;margin-bottom:.75rem}
.fd-io{display:flex;border:1.5px solid var(--bd);border-radius:var(--rsm);overflow:hidden;margin-bottom:1rem;background:var(--sur2)}
.fd-io .io-cell{padding:.5rem .8rem}

/* steps */
.steps{display:flex;flex-direction:column;max-width:520px}
.step-row{display:flex;gap:.6rem;position:relative}
.step-row:not(:last-child)::before{
  content:'';position:absolute;left:12px;top:26px;bottom:-2px;

}
.si{
  flex-shrink:0;width:25px;height:25px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;margin-top:.1rem;position:relative;z-index:1;
}
.si-p{background:color-mix(in srgb,#64748B 12%,transparent);color:#64748B;border:1.5px solid #64748B}
/* 菱形: ::before=外枠(amber), ::after=内塗り(cream), テキストは最前面 */
.si-c{
  border-radius:0;background:transparent;
  color:#92400E;font-size:9px;font-family:var(--mono);
  isolation:isolate;
}
.si-c::before{
  content:'';position:absolute;inset:0;
  background:#D97706;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);

.si-c::after{
  content:'';position:absolute;inset:2.5px;
  background:#FEF3C7;

.si-r{background:color-mix(in srgb,#059669 15%,transparent);color:#059669;border:1.5px solid #059669}
.sb{flex:1;padding:.2rem 0 .85rem;min-width:0}
.st{font-size:12.5px;color:var(--tx1);font-weight:500;line-height:1.45}
.sn{font-size:11.5px;color:var(--tx2);margin-top:.2rem;line-height:1.45}
.sbr{margin-top:.3rem;display:flex;flex-direction:column;gap:.2rem}
.br{display:flex;align-items:baseline;gap:.35rem;font-size:11.5px}
.by{font-size:9px;font-weight:700;background:#D1FAE5;color:#065F46;padding:1px 5px;border-radius:3px;flex-shrink:0}
.bn{font-size:9px;font-weight:700;background:#FEF3C7;color:#92400E;padding:1px 5px;border-radius:3px;flex-shrink:0}
.bt{color:var(--tx2)}
.step-lg{
  display:flex;gap:.75rem;flex-wrap:wrap;font-size:11px;color:var(--tx3);
  margin-top:.75rem;padding-top:.6rem;border-top:1px solid var(--bd);
}
.lg-i{display:flex;align-items:center;gap:.3rem}
.lg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
</style>

<script>
/* ══════════ DATA ══════════ */
const STAGES = [
  { id:1, k:'s1',
    name:'多段ヘッダーの検出と解決機能',
    emoji:'🔗',
    desc:'生グリッドからヘッダー行を特定し、name / unit の役割を分類して1行の列名に統合する。step2_detect._extract_dataframe から呼び出され、Step2（検出）完了時点で確定する（normalize_tables のパイプラインより前）。',
    fns:[{n:'detect_header_roles',pub:true},{n:'_is_unit_row',pub:false},{n:'merge_header_rows',pub:true},{n:'_detect_row_language',pub:false}],
    rows:[
      {k:'タイトル行',v:'先頭の単一文字列行をスキップ（例: シート名・ファイルタイトル）'},
      {k:'ヘッダー行',v:'文字列比率 ≥ 50% の連続行を最大12行検出'},
      {k:'マージ形式',v:'name のみ → "_" 連結 / name+unit → "名称 [単位]"'},
      {k:'多軸展開用データ',v:'全行が name 役割かつ2行以上の場合、結合前の生ヘッダー行を raw_header_rows として保持（S3で使用）'},
    ]},
  { id:2, k:'s2',
    name:'Transpose検出と変換機能',
    emoji:'🔄',
    desc:'表の行と列が意味的に逆転している（エンティティが列・属性が行）かをLLMで判定し、正しい向きに転置する。normalize_tables の最初に実行し、以降の全処理がこの表の向きを前提とする。',
    fns:[{n:'make_transpose_client',pub:true},{n:'detect_transpose',pub:true},{n:'_call_transpose_api',pub:false},{n:'_format_table_for_transpose_check',pub:false},{n:'apply_transpose',pub:true}],
    rows:[
      {k:'判定基準',v:'1列目が指標名リスト・2列目以降がエンティティ（個体識別子）リストに見える場合のみ true'},
      {k:'退化ケース除外',v:'列数 ≤ 1 の場合はLLMを呼ばず None（形状上自明なケースのみ）'},
      {k:'定義場所',v:'src/step3_normalize_llm.py（LLM使用処理を分離）'},
    ]},
  { id:3, k:'s3',
    name:'多軸ヘッダー展開機能',
    emoji:'🧩',
    desc:'多段ヘッダーの各行を構造的に分類し、単一値の注記行・時系列の冗長な上位グルーピング行は決定論的に除去。独立した複数カテゴリ軸（例: 科目×支店）が残る場合のみLLMで軸名を判定し、tidy形式に展開する。',
    fns:[{n:'detect_multi_axis_header',pub:true},{n:'_ffill_header_row',pub:false},{n:'_header_row_kind',pub:false},{n:'apply_multi_axis_header',pub:true},{n:'detect_dimension_axes',pub:true},{n:'_dedup_columns',pub:false}],

      {t:'p',tx:'detect_and_split_units を呼び出し',calls:['detect_and_split_units']},
      {t:'c',tx:'単位混在を検出？',yes:'cleaned_df を分離後の値に更新し、unit_master_df / unit_split_info を設定'},
      {t:'r',tx:'return cleaned_df'},
    ]},
  detect_wide_to_long:{s:8,pub:true,io:{i:'pd.DataFrame, title?, filename?',o:'{label_cols,time_var_name,time_kind,time_tokens,indicators,parsed_cols} | None'},
    desc:'DataFrame が「時系列×複数指標」の複合列名を持つ横持ち表かを検出する。列名が時系列トークン単体の列は対象外（detect_cross_table の担当）。',
    steps:[
      {t:'c',tx:'df が空 または 列数 < 4？',yes:'return None'},
      {t:'p',tx:'時系列トークン単体の列を除いた候補列を抽出'},
      {t:'p',tx:'各候補列を _split_time_indicator で(時系列トークン,指標名,種別)に分解',calls:['_split_time_indicator']},
      {t:'c',tx:'分解できた列が候補列の80%未満？',yes:'return None'},
      {t:'c',tx:'時系列トークン種類 < 2 または 指標種類 < 2？',yes:'return None（指標1種類なら detect_cross_table の担当）'},
      {t:'c',tx:'想定グリッド（時系列数×指標数）に対する実列数比率 < 60%？',yes:'return None（歯抜けが多すぎる場合は誤検出とみなす）'},
      {t:'r',tx:'return {label_cols, time_var_name, time_kind, time_tokens, indicators, parsed_cols}'},
    ]},
  _split_time_indicator:{s:8,pub:false,io:{i:'str（列名）',o:'(time_token,indicator,time_kind) | None'},
    desc:'列名を (time_token, indicator_name, time_kind) に分解する。あらゆる分割点でプレフィックス／サフィックスが _classify_col_time にマッチするかを試し、最も長く一致したトークンを採用する。',
    steps:[
      {t:'p',tx:'全ての分割位置でプレフィックス・サフィックスそれぞれを _classify_col_time で判定',calls:['_classify_col_time']},
      {t:'p',tx:'一致した候補を (トークン, 残りの指標名, 種別) として収集'},
      {t:'c',tx:'候補なし？',yes:'return None'},
      {t:'r',tx:'return 最も長いトークンの候補（例: "2024Q1売上" では "2024"ではなく"2024Q1"を優先）'},
    ]},
  stack_wide_to_long:{s:8,pub:true,io:{i:'pd.DataFrame, info',o:'縦持ち pd.DataFrame'},
    desc:'detect_wide_to_long の検出結果を使って横持ち→縦持ち変換する。時系列トークンごとにサブフレームを作り、指標列は元の列出現順を維持したまま縦に連結する。',
    steps:[
      {t:'p',tx:'time_tokens を走査し、各トークンについてラベル列＋時系列列のサブフレームを生成'},
      {t:'p',tx:'各指標について対応する元列があればその値、無ければ NaN で埋める',nt:'グリッドの歯抜けを許容'},
      {t:'p',tx:'全サブフレームを縦に連結'},
      {t:'r',tx:'return 縦持ち DataFrame（指標は列として維持）'},
    ]},
  detect_cross_table:{s:9,pub:true,io:{i:'pd.DataFrame, title?, filename?',o:'Dict | None'},
    desc:'DataFrame がクロス集計形式（月・四半期・年度等を列に持つ横持ち）かを検出する。',
    steps:[
      {t:'c',tx:'列数 < 3 または DataFrame が空？',yes:'return None'},
      {t:'p',tx:'各列名を _classify_col_time で時系列パターンに分類',calls:['_classify_col_time']},
      {t:'c',tx:'時系列列が1列もない？',yes:'return None'},
      {t:'p',tx:'候補範囲の時系列比率を計算'},
      {t:'c',tx:'時系列列 < 2列 または 比率 < 80%？',yes:'return None'},
      {t:'p',tx:'ラベル列と時系列列を分離'},
      {t:'c',tx:'月のみ列？',yes:'_extract_year_context でタイトル/ファイル名から年を補完',calls:['_extract_year_context']},
      {t:'r',tx:'return {label_cols, time_cols, time_kind, var_name, value_name, year_context}'},
    ]},
  stack_cross_table:{s:9,pub:true,io:{i:'pd.DataFrame, stack_info',o:'pd.DataFrame（縦持ち）'},
    desc:'クロス集計形式（横持ち）を縦持ち（long format）に変換する。',
    steps:[
      {t:'p',tx:'stack_info から各パラメータを取得',nt:'label_cols, time_cols, var_name, value_name, year_context'},
      {t:'p',tx:'pd.melt() で縦持ち変換',nt:'id_vars=label_cols, value_vars=time_cols'},
      {t:'c',tx:'月のみ列 かつ year_context あり？',yes:'label_cols の直後に 年 列を挿入'},
      {t:'p',tx:'インデックスをリセット'},
      {t:'r',tx:'return 縦持ち DataFrame'},
    ]},
  _classify_col_time:{s:9,pub:false,io:{i:'str（列名）',o:'str | None'},
    desc:'列名が時系列パターンにマッチするかを判定し、種別文字列を返す。S8（Wide_to_long）とS3（多軸ヘッダー展開）からも共有される。',
    steps:[
      {t:'p',tx:'列名を文字列化・trim'},
      {t:'p',tx:'TIME_PATTERNS の各パターンと順番に照合',nt:'year_month / month / fiscal_quarter / quarter / fiscal_half / fiscal_year / year / year_num'},
      {t:'c',tx:'パターンに一致？',yes:'return 種別文字列',no:'次のパターンへ'},
      {t:'r',tx:'return None（いずれにも一致しない）'},
    ]},
  _extract_year_context:{s:9,pub:false,io:{i:'title?, filename?',o:'int | None'},
    desc:'テーブルタイトルまたはファイル名から西暦年（1900〜2099）を抽出する。',
    steps:[
      {t:'p',tx:'タイトル文字列を正規表現でスキャン（1900〜2099）'},
      {t:'c',tx:'一致あり？',yes:'return 整数（西暦年）'},
      {t:'p',tx:'ファイル名を正規表現でスキャン'},
      {t:'c',tx:'一致あり？',yes:'return 整数（西暦年）'},
      {t:'r',tx:'return None'},
    ]},
};

/* ══════════ COLOR VARS ══════════ */
const SV = {
  s1:{c:'var(--s1)',bg:'var(--s1-bg)'},
  s2:{c:'var(--s2)',bg:'var(--s2-bg)'},
  s3:{c:'var(--s3)',bg:'var(--s3-bg)'},
  s4:{c:'var(--s4)',bg:'var(--s4-bg)'},
  s5:{c:'var(--s5)',bg:'var(--s5-bg)'},
  s6:{c:'var(--s6)',bg:'var(--s6-bg)'},
  s7:{c:'var(--s7)',bg:'var(--s7-bg)'},
  s8:{c:'var(--s8)',bg:'var(--s8-bg)'},
  s9:{c:'var(--s9)',bg:'var(--s9-bg)'},
};
const KEYS = ['s1','s2','s3','s4','s5','s6','s7','s8','s9'];
function sv(k){const v=SV[k];return `--sc:${v.c};--sc-bg:${v.bg}`}

/* ══════════ STATE ══════════ */
let activeStage=null, isStageSplit=false, leftW=460;
let expandedFns=new Set(); // 中央パネルでカード下に詳細展開中の関数名
let subFnStack={}; // カード内右側インスペクタのナビゲーションスタック: { [トップ関数名]: [子関数名, 孫関数名, ...] }
let subSplitRatio={}; // カード内の 処理ステップ/子関数インスペクタ 分割比率: { [トップ関数名]: 0〜1（既定 0.5 = 中央） }

/* ══════════ BUILD OVERVIEW ══════════ */
function buildOverview(){
  let h=`
    <div class="io-bar">
      <div class="io-cell" style="--sc:var(--s1)">
        <div class="io-lbl">入力</div>
        <div class="io-val">DetectedTable.df</div>
        <div class="io-sub">step2_detect が構築した生 DataFrame</div>
      </div>
      <div class="io-cell" style="--sc:var(--s9)">
        <div class="io-lbl">出力</div>
        <div class="io-val">正規化済み DataFrame + メタ情報</div>
        <div class="io-sub">transpose_info, multi_axis_info, filled_cols, uchi_split_info, stack_info, wide_to_long_info, agg_removed_row/col_metadata, unit_split_info…</div>
      </div>
    </div>`;

  STAGES.forEach((s,i)=>{
    const k=KEYS[i];
    const pills=s.fns.map(f=>`<span class="pill${f.pub?' pub':''}">${f.n}</span>`).join('');
    const rows=s.rows.map(r=>`<div class="dr"><span class="dk">${r.k}</span><span class="dv">${r.v}</span></div>`).join('');
    const isActive=activeStage===s.id;
    h+=`
      <div class="stage-card${isActive?' active':''}" id="sc${s.id}" style="${sv(k)}" onclick="selectStage(${s.id})">
        <div class="stage-hd">
          <span class="stage-chip">S${s.id}</span>
          <span style="font-size:15px">${s.emoji}</span>
          <span class="stage-name">${s.name}</span>
        </div>
        <div class="stage-body">
          <div class="stage-desc">${s.desc}</div>
          <div class="fn-pills">${pills}</div>
          <div class="detail-rows">${rows}</div>
        </div>
      </div>`;
    if(i<STAGES.length-1) h+=`<div class="arr"><div class="arr-line"></div><div class="arr-head"></div></div>`;
  });
  h+=`<div class="click-hint">▲ カードをクリックして関数フローを表示 / 再クリックで全体に戻る</div>`;
  document.getElementById('left-inner').innerHTML=h;
}

/* ══════════ SELECT / TOGGLE STAGE ══════════ */
function selectStage(id){
  if(activeStage===id && isStageSplit){ closeSplit(); return; }
  if(activeStage!==id){ expandedFns.clear(); subFnStack={}; subSplitRatio={}; }
  activeStage=id;
  document.querySelectorAll('.stage-card').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('sc'+id);
  if(card) card.classList.add('active');
  if(!isStageSplit){
    isStageSplit=true;
    document.getElementById('app').classList.add('s-split');
    document.getElementById('left-wrap').style.width=leftW+'px';
  }
  renderStageFlow(id);
}

/* ══════════ CLOSE SPLIT ══════════ */
function closeSplit(){
  isStageSplit=false; activeStage=null;
  expandedFns.clear(); subFnStack={}; subSplitRatio={};
  const app=document.getElementById('app');
  app.classList.remove('s-split');
  document.getElementById('left-wrap').style.width='';
  document.getElementById('mid-inner').innerHTML='';
  document.querySelectorAll('.stage-card').forEach(c=>c.classList.remove('active'));
}

/* ══════════ RENDER STAGE FLOW ══════════ */
function renderStageFlow(id, resetScroll=true){
  const s=STAGES[id-1], k=KEYS[id-1], fl=FLOWS[id];
  const nodesHtml=fl.nodes.map(n=>{
    if(n.type==='arrow') return `
      <div class="flow-arr">
        <div class="fa-ln"></div>
        <span class="fa-lbl">${n.label}</span>
        <div class="fa-hd"></div>
      </div>`;
    const curSub=(subFnStack[n.fn]||[]).slice(-1)[0];
    const uses=n.uses.length?`<div class="fn-uses">${n.uses.map(u=>`
      <div class="use-row">
        <span class="use-arr">↳ 呼び出し</span>
        <span class="use-fn${curSub===u.fn?' uf-active':''}" onclick="event.stopPropagation();openSubFn('${n.fn}','${u.fn}')">${u.fn}</span>
        <span class="use-nt">— ${u.note}</span>
      </div>`).join('')}</div>`:'';
    const isOpen=expandedFns.has(n.fn);
    const inlineDetail=isOpen?buildInlineDetailHtml(n.fn):'';
    return `<div class="fn-box${isOpen?' fx-active':''}" onclick="toggleInline('${n.fn}')">
      <div class="fn-bh">
        <span class="fn-nm">${n.fn}</span>
        <span class="fn-badge ${n.pub?'fb-pub':'fb-prv'}">${n.pub?'Public':'Private'}</span>
      </div>
      <div class="fn-desc">${n.desc}</div>
      ${uses}
      <div class="fn-ret"><span class="fn-ret-lbl">→ return</span><span class="fn-ret-val">${n.ret}</span></div>
      ${inlineDetail}
    </div>`;
  }).join('');

  const midEl=document.getElementById('mid-inner');
  if(!midEl) return;
  midEl.innerHTML=`
    <div style="${sv(k)}">
      <div class="rf-top">
        <div>
          <div class="sf-tag">${s.emoji} Stage ${id}</div>
          <div class="sf-title">${s.name}</div>
        </div>
        <button class="rf-close" onclick="closeSplit()" title="全体に戻る (←)">✕</button>
      </div>
      <div class="sf-overview">${fl.overview}</div>
      <div class="sec-label">関数フロー（カードをクリックで詳細展開）</div>
      <div id="fn-flow-area">${nodesHtml}</div>
    </div>`;
  if(resetScroll) document.getElementById('mid-wrap').scrollTop=0;
}

/* ══════════ TOGGLE INLINE FUNCTION DETAIL (below the card) ══════════ */
function toggleInline(fn){
  if(expandedFns.has(fn)) expandedFns.delete(fn); else expandedFns.add(fn);
  rerenderMid();
}

/* ══════════ NESTED-FUNCTION INSPECTOR (right side of the card) ══════════ */
function openSubFn(cardFn, targetFn){
  expandedFns.add(cardFn);
  const stack=subFnStack[cardFn]||(subFnStack[cardFn]=[]);
  if(stack[stack.length-1]!==targetFn) stack.push(targetFn);
  rerenderMid();
}
function jumpSubFn(cardFn, idx){
  const stack=subFnStack[cardFn];
  if(!stack) return;
  stack.length=idx+1;
  rerenderMid();
}
function closeSubFn(cardFn){
  delete subFnStack[cardFn];
  delete subSplitRatio[cardFn];
  rerenderMid();
}
function rerenderMid(){
  const mw=document.getElementById('mid-wrap');
  const st=mw.scrollTop;
  renderStageFlow(activeStage, false);
  mw.scrollTop=st;
}

function buildInlineDetailHtml(fnName){
  const fn=FN[fnName];
  if(!fn) return '';
  const stack=subFnStack[fnName]||[];
  const stepsHtml=`<div class="steps">${buildStepsHtml(fn,fnName)}</div>`;
  let bodyHtml;
  if(stack.length){
    const ratio=subSplitRatio[fnName] ?? 0.5; // 既定は親関数のちょうど中心
    bodyHtml=`
      <div class="fid-body" data-card="${fnName}">
        <div class="fid-steps" style="flex:0 0 calc(${(ratio*100).toFixed(2)}% - 3px)">${stepsHtml}</div>
        <div class="fid-dvd" data-card="${fnName}" title="ドラッグで幅調整"></div>
        <div class="fid-sub">${renderSubFnPanel(fnName,stack)}</div>
      </div>`;
  } else {
    bodyHtml=`<div class="fid-body"><div class="fid-steps">${stepsHtml}</div></div>`;
  }
  return `
    <div class="fn-inline-detail" onclick="event.stopPropagation()">
      <div class="fd-io">
        <div class="io-cell" style="--sc:var(--s2)"><div class="io-lbl">入力</div><div class="io-val">${fn.io.i}</div></div>
        <div class="io-cell" style="--sc:var(--s9)"><div class="io-lbl">出力</div><div class="io-val">${fn.io.o}</div></div>
      </div>
      <div class="sec-label">処理ステップ</div>
      ${bodyHtml}
    </div>`;
}

function renderSubFnPanel(cardFn, stack){
  const cur=stack[stack.length-1];
  const sf=FN[cur];
  if(!sf) return '';
  const ancestors=stack.slice(0,-1);
  const crumbHtml=ancestors.length?`<div class="fid-crumb">${ancestors.map((name,i)=>
    `<span class="cr-lnk" onclick="event.stopPropagation();jumpSubFn('${cardFn}',${i})">${name}</span><span class="cr-sep">›</span>`
  ).join('')}</div>`:'';
  return `
    <div class="fid-sub-hd">
      ${crumbHtml}
      <div class="fn-bh" onclick="event.stopPropagation();closeSubFn('${cardFn}')" title="クリックで閉じる">
        <span class="fn-nm">${cur}</span>
        <span class="fn-badge ${sf.pub?'fb-pub':'fb-prv'}">${sf.pub?'Public':'Private'}</span>
        <span class="fid-sub-close-hint">▲ 閉じる</span>
      </div>
    </div>
    <div class="fd-desc">${sf.desc}</div>
    <div class="fd-io">
      <div class="io-cell" style="--sc:var(--s2)"><div class="io-lbl">入力</div><div class="io-val">${sf.io.i}</div></div>
      <div class="io-cell" style="--sc:var(--s9)"><div class="io-lbl">出力</div><div class="io-val">${sf.io.o}</div></div>
    </div>
    <div class="steps">${buildStepsHtml(sf,cardFn)}</div>`;
}

function buildStepsHtml(fn, cardFn){
  return fn.steps.map((st,i)=>{
    const num=i+1, icon=st.t==='c'?'if':st.t==='r'?'↩':num;
    const br=(st.yes||st.no)?`<div class="sbr">
      ${st.yes?`<div class="br"><span class="by">YES</span><span class="bt">${st.yes}</span></div>`:''}
      ${st.no ?`<div class="br"><span class="bn">NO</span><span class="bt">${st.no}</span></div>`:''}
    </div>`:'';
    const curSub=(subFnStack[cardFn]||[]).slice(-1)[0];
    const calls=(st.calls&&st.calls.length)?`<div class="fn-uses step-calls">${st.calls.map(c=>`
      <div class="use-row">
        <span class="use-arr">↳ 呼び出し</span>
        <span class="use-fn${curSub===c?' uf-active':''}" onclick="event.stopPropagation();openSubFn('${cardFn}','${c}')">${c}</span>
      </div>`).join('')}</div>`:'';
    return `<div class="step-row">
      <div class="si si-${st.t}">${icon}</div>
      <div class="sb">
        <div class="st">${st.tx}</div>
        ${st.nt?`<div class="sn">${st.nt}</div>`:''}
        ${br}
        ${calls}
      </div>
    </div>`;
  }).join('');
}

/* ══════════ DRAG RESIZE ══════════ */
(function(){
  function makeDrag(dvdId, getEl, getW, setW){
    const dvd=document.getElementById(dvdId);
    let drag=false, dsx=0, dsw=0;
    dvd.addEventListener('mousedown',e=>{
      drag=true; dsx=e.clientX;
      dsw=getEl().getBoundingClientRect().width;
      dvd.classList.add('drag');
      document.body.style.userSelect='none';
      document.body.style.cursor='col-resize';
      e.preventDefault();
    });
    document.addEventListener('mousemove',e=>{
      if(!drag) return;
      const app=document.getElementById('app');
      const nw=Math.max(240,Math.min(dsw+(e.clientX-dsx),app.clientWidth-240));
      setW(nw); getEl().style.width=nw+'px';
    });
    document.addEventListener('mouseup',()=>{
      if(!drag) return;
      drag=false; dvd.classList.remove('drag');
      document.body.style.userSelect=''; document.body.style.cursor='';
    });
  }
  makeDrag('dvd1',()=>document.getElementById('left-wrap'), ()=>leftW, v=>{leftW=v});
})();

/* ══════════ NESTED-PANEL DRAG RESIZE (per-card, elements are re-created on every render → event delegation) ══════════ */
(function(){
  let dragCard=null, startX=0, startRatio=0.5, containerW=0;
  document.addEventListener('mousedown', e=>{
    const dvd=e.target.closest('.fid-dvd');
    if(!dvd) return;
    dragCard=dvd.dataset.card;
    startX=e.clientX;
    containerW=dvd.closest('.fid-body').getBoundingClientRect().width;
    startRatio=subSplitRatio[dragCard] ?? 0.5;
    dvd.classList.add('drag');
    document.body.style.userSelect='none';
    document.body.style.cursor='col-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!dragCard || !containerW) return;
    let ratio=startRatio + (e.clientX-startX)/containerW;
    ratio=Math.max(.2,Math.min(.8,ratio));
    subSplitRatio[dragCard]=ratio;
    document.querySelectorAll(`.fid-body[data-card="${dragCard}"] .fid-steps`).forEach(el=>{
      el.style.flex=`0 0 calc(${(ratio*100).toFixed(2)}% - 3px)`;
    });
  });
  document.addEventListener('mouseup', ()=>{
    if(!dragCard) return;
    document.querySelectorAll('.fid-dvd.drag').forEach(el=>el.classList.remove('drag'));
    document.body.style.userSelect=''; document.body.style.cursor='';
    dragCard=null; containerW=0;
  });
})();

/* ══════════ INIT ══════════ */
buildOverview();
</script>
