# テーブル直上の「タイトル候補行」のうち、実際には注記・メタデータ行
# （テーブルの意味的タイトルには含めるべきでない行）と判定するための接頭辞。
# _classify_row (step2) で、1セルのみのテキスト行がこの接頭辞のいずれかで
# 始まる場合に "note" 種別（タイトル種別 "title" ではなく）と判定する。
# 前方一致（startswith）で比較する。
#
# 例: "作成日：2025/03/31" は "作成日" に前方一致 → note 行と判定され、
#     直前のタイトル行「2025年度 AP数販売実績（エリア別）」と連結されずに
#     テーブルタイトルから除外される。

# ── 記号・注記マーカー ──────────────────────────────────────────────────────
# YAML の特殊文字（*, &, ! 等）を含む値は誤解釈を避けるため引用符で囲む。
- "※"
- "＊"
- "*"
- 注）
- 注)
- （注
- (注
- 注意
- ＜注
- "<注"
- "note:"
- "NOTE:"
- "＊注"
- "*注"

# ── 作成・更新・出典等のメタデータラベル ───────────────────────────────────
# 「ラベル：値」形式（例: "作成日：2025/03/31"）でテーブル直上に挿入される
# ことが多く、意味的にはテーブル自体のタイトルではなく付随情報のため対象外とする。
- 作成日
- 更新日
- 最終更新日
- 作成者
- 出典
- 集計日
- 集計基準日
- 公表日
- 発行日
- 調査日
- データ取得日
- 対象期間
- 単位
- 備考
