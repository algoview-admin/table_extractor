# 「内訳」を示す接頭辞キーワード
# detect_uchi_breakdown (step3) で使用する。
# セル値がこの接頭辞のいずれかで始まる場合、直前の合計値の内訳行と判定する
# （半角/全角丸括弧で囲まれた表記「（うち男性）」等にも対応する。詳細は
# _is_uchi_label のロジックを参照）。
# 例: "うち男性" → 接頭辞 "うち" を除いた "男性" を子ラベルとする。
#
# 意図的に含めていない語:
#   「外数」— 「うち/内数」とは意味が正反対（合計に含まれない別枠を示す）
#            ため、同じ親子関係抽出ロジックを適用すると誤りになる。
#   単独の「内」— 「内容」「内部」等との誤検出リスクが高いため対象外。

- うち
- 内数
- 内訳
- 再掲
