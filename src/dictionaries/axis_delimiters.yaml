# Wide_to_long検出（軸×指標の複合列名）で使う区切り文字
# detect_wide_to_long の Tier2（_classify_columns_by_delimiter, step3）で使用する。
# 列名がこのいずれかの文字で一貫して区切られている場合、その区切り文字の位置で
# 軸トークンと指標名を分割する（例: "東京支社_売上" → 軸="東京支社", 指標="売上"）。
# 記載順が優先順位（merge_header_rows が多段ヘッダー統合時に使う "_" を最優先とする）。
#
# 意図的に含めていない文字:
#   半角/全角スペース、"・"（中黒）— 正当な日本語複合語の内部にも頻出するため
#   （例: "支店・営業所"、"対前年比 増減"）、区切り文字として扱うと誤検出が増える。

- "_"
- "-"
- "－"
- "／"
- "/"
